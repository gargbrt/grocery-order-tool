# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    # `next build` executes route modules while "Collecting page data", and
    # src/lib/auth.ts throws if JWT_SECRET is unset in production (NODE_ENV
    # is "production" during `next build` regardless of the environment it
    # runs in). Prisma Client also expects DATABASE_URL to be a valid-looking
    # connection string even though nothing here actually connects to it.
    # Dummy values only - CI never talks to a real database.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci_dummy"
      JWT_SECRET: "ci-dummy-secret-not-used-for-anything-real"

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - name: Generate Prisma Client
      run: npx prisma generate
    - run: npm run build --if-present
    - run: npm test
