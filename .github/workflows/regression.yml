name: Regression

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # mcp-server/ is a separate sub-project (own package.json/tsconfig,
      # not installed here) - excluded from the root tsconfig.json so it
      # doesn't pollute this app's typecheck.
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run regression suite
        run: npm run test
