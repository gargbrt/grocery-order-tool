name: Regression

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # The root tsconfig also sweeps up mcp-server/, a separate sub-project
      # with its own package.json that isn't installed here - so we only
      # fail the build on errors reported under src/.
      - name: Typecheck (src/ only)
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt || true
          if grep -q '^src/' /tmp/tsc-output.txt; then
            echo "TypeScript errors found under src/:"
            grep '^src/' /tmp/tsc-output.txt
            exit 1
          fi
          echo "No TypeScript errors under src/."

      - name: Run regression suite
        run: npm run test
